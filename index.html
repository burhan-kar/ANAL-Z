<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --bg:#0c0e14; --bg2:#12151f; --panel:#161a26; --panel2:#1d2230; --line:#262c3d;
  --gold:#e3b341; --gold-dim:#9a7d34;
  --up:#3dd68c; --down:#ff6b81; --neutral:#7d8597;
  --text:#eef1f7; --muted:#8a92a6; --faint:#5a6175;
  --buy-bg:rgba(61,214,140,.1); --sell-bg:rgba(255,107,129,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{overscroll-behavior-y:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.45;
  padding-top:env(safe-area-inset-top);
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* Header */
.appbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(12,14,20,.92);backdrop-filter:blur(12px);z-index:40}
.brand{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;letter-spacing:-.2px}
.brand .mark{width:22px;height:22px}
.status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint);transition:.3s}
.dot.live{background:var(--up);box-shadow:0 0 7px var(--up)}
.dot.err{background:var(--down)}
.dot.load{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.3}}

/* Tab bar - bottom */
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(18,21,31,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:40}
.tabbar button{flex:1;background:none;border:none;color:var(--faint);padding:9px 2px 7px;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
.tabbar button.active{color:var(--gold)}
.tabbar svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}

.wrap{max-width:600px;margin:0 auto;padding:14px 14px 92px}

/* Cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
.card.tap{cursor:pointer;transition:transform .1s,border-color .15s}
.card.tap:active{transform:scale(.985);border-color:var(--gold-dim)}

.row{display:flex;justify-content:space-between;align-items:center}
.fav-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.fav-name{font-size:15px;font-weight:700}
.fav-tag{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
.fav-price{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-top:6px}
.chg{font-size:13px;font-weight:700;padding:3px 9px;border-radius:9px;white-space:nowrap}
.chg.up{color:var(--up);background:var(--buy-bg)} .chg.down{color:var(--down);background:var(--sell-bg)} .chg.flat{color:var(--neutral);background:rgba(125,133,151,.1)}

/* Verdict pill */
.verdict{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;margin-top:10px}
.verdict.buy{color:var(--up);background:var(--buy-bg);border:1px solid rgba(61,214,140,.25)}
.verdict.sell{color:var(--down);background:var(--sell-bg);border:1px solid rgba(255,107,129,.25)}
.verdict.neutral{color:var(--neutral);background:rgba(125,133,151,.08);border:1px solid var(--line)}
.verdict .dotv{width:6px;height:6px;border-radius:50%;background:currentColor}

.section-label{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.7px;margin:20px 4px 9px}

.empty{text-align:center;color:var(--muted);font-size:14px;padding:32px 16px;line-height:1.6}
.empty .big{font-size:15px;color:var(--text);font-weight:600;margin-bottom:6px}

/* Buttons */
.btn{background:var(--gold);color:#1a1400;border:none;border-radius:11px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:active{opacity:.85}
.btn.sec{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn.ghost{background:none;color:var(--gold);border:1px solid var(--gold-dim)}
.btn.block{width:100%}
.btn.sm{padding:8px 13px;font-size:13px;border-radius:9px}

input,select{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px;font-size:15px;font-family:inherit;width:100%}
input:focus,select:focus{outline:none;border-color:var(--gold-dim)}
label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px;font-weight:600}

/* Detail metrics */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.metric{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
.metric .ml{font-size:11px;color:var(--muted);font-weight:600}
.metric .mv{font-size:18px;font-weight:700;margin-top:2px}
.metric .ms{font-size:11px;margin-top:2px;font-weight:600}

.gauge{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;margin-top:7px;position:relative}
.gauge .fill{height:100%;border-radius:3px;transition:width .4s}

/* Reasoning list */
.reason{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.5}
.reason:last-child{border:none}
.reason .ic{flex:0 0 auto;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-top:1px}
.reason .ic.pos{background:var(--buy-bg);color:var(--up)} .reason .ic.neg{background:var(--sell-bg);color:var(--down)} .reason .ic.neu{background:rgba(125,133,151,.12);color:var(--neutral)}

/* Chart */
.chartbox{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:12px;margin-top:4px}
svg.chart{width:100%;height:160px;display:block}

/* News */
.news-item{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px}
.news-item:active{border-color:var(--gold-dim)}
.news-title{font-size:14px;font-weight:600;line-height:1.4}
.news-meta{font-size:11px;color:var(--faint);margin-top:7px;display:flex;gap:8px;align-items:center}
.tone{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.tone.pos{background:var(--buy-bg);color:var(--up)} .tone.neg{background:var(--sell-bg);color:var(--down)} .tone.neu{background:rgba(125,133,151,.12);color:var(--neutral)}

/* Alarm */
.alarm-item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.alarm-item.done{opacity:.5}
.alarm-cond{font-size:14px;font-weight:600}
.alarm-sub{font-size:11px;color:var(--muted);margin-top:2px}
.del{color:var(--down);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:20px 16px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:700;margin-bottom:14px}
.modal .grab{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer}
.chip:active{border-color:var(--gold)}
.chip.gold{border-color:var(--gold-dim);color:var(--gold)}

.banner{position:fixed;top:calc(env(safe-area-inset-top) + 8px);left:12px;right:12px;max-width:576px;margin:0 auto;background:var(--gold);color:#1a1400;border-radius:13px;padding:14px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.5);font-weight:600;font-size:14px}
.banner .ba{display:flex;gap:8px;margin-top:10px}
.banner .ba button{flex:1;border:none;border-radius:8px;padding:9px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}

.note{font-size:12px;color:var(--muted);line-height:1.55;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:12px;margin-top:9px}
.note b{color:var(--gold)}
.warn{border-color:rgba(255,107,129,.3)}
.disc{font-size:11px;color:var(--faint);text-align:center;padding:18px 10px;line-height:1.65}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.refresh-fab{position:fixed;right:16px;bottom:calc(70px + env(safe-area-inset-bottom));width:50px;height:50px;border-radius:25px;background:var(--gold);color:#1a1400;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:38;cursor:pointer}
.refresh-fab svg{width:22px;height:22px;stroke:#1a1400;fill:none;stroke-width:2}
.refresh-fab.spinning svg{animation:sp 1s linear infinite}
</style>

<!-- APP LOGIC -->
<script>
/* =====================================================================
   PİYASA TERMİNALİ  —  app.js
   Çekirdek: veri çekme + teknik analiz + kural-tabanlı yorum + UI
   Veri kaynakları:
     - Altın/Gümüş/Döviz: Truncgil (anahtarsız, çoklu yedek + CORS proxy)
     - BIST hisseleri: NosyAPI (kullanıcı anahtarı, anlık fiyat)
   YATIRIM TAVSİYESİ DEĞİLDİR. Tüm yorumlar olasılıksaldır.
   ===================================================================== */

'use strict';

/* ---------- Depolama ---------- */
const LS = {
  get:(k,d)=>{ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v); }catch{ return d; } },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
};

/* ---------- Varlık katalogu ----------
   type: 'metal' (Truncgil), 'fx' (Truncgil), 'bist' (NosyAPI)
   bist anahtarı: bist:SEMBOL (örn. bist:THYAO) */
const CATALOG = {
  // Kıymetli maden & döviz (Truncgil) — kodlar gerçek today.json ile birebir eşleşir
  gram_altin:{name:'Gram Altın', tag:'Kıymetli Maden', type:'metal', tkeys:['gram-altin','GRA','Gram Altın'], unit:'₺'},
  darphane:  {name:'Darphane Gram (Has Altın)', tag:'Kıymetli Maden', type:'metal', tkeys:['gram-has-altin','has-altin','Has Altın'], unit:'₺'},
  ons:       {name:'Ons Altın (XAU)', tag:'Kıymetli Maden', type:'metal', tkeys:['ons','ONS','Ons'], unit:'$'},
  gumus:     {name:'Gümüş (Gram)', tag:'Kıymetli Maden', type:'metal', tkeys:['gumus','GUMUS','Gümüş'], unit:'₺'},
  ceyrek:    {name:'Çeyrek Altın', tag:'Kıymetli Maden', type:'metal', tkeys:['ceyrek-altin','CEYREK_YENI','Çeyrek Altın'], unit:'₺'},
  cumhuriyet:{name:'Cumhuriyet Altını', tag:'Kıymetli Maden', type:'metal', tkeys:['cumhuriyet-altini','CUMHURIYET_YENI','Cumhuriyet Altını'], unit:'₺'},
  usd:       {name:'Dolar / TL', tag:'Döviz', type:'fx', tkeys:['USD','usd','Dolar'], unit:'₺'},
  eur:       {name:'Euro / TL', tag:'Döviz', type:'fx', tkeys:['EUR','eur','Euro'], unit:'₺'},
};

/* Popüler BIST hisseleri (favori eklerken hızlı seçim için) */
const BIST_POPULAR = ['THYAO','GARAN','AKBNK','ASELS','KCHOL','SISE','EREGL','BIMAS','SAHOL','TUPRS','FROTO','PGSUS','TCELL','YKBNK','SASA','HEKTS','KOZAL','PETKM'];

/* ---------- Uygulama durumu ---------- */
const S = {
  tab:'watch',
  favorites: LS.get('favorites', ['gram_altin','darphane','ons','gumus','usd']),  // varlık anahtarları veya bist:SEMBOL
  metalData: null,        // {gram_altin:{buy,sell,change}, ...}
  bistData: {},           // {THYAO:{price,change,...}}
  series: LS.get('series', {}),   // {key:[{t,v}]} cihaz-içi fiyat geçmişi (yedek)
  tdSeries: {},           // (kullanılmıyor)
  tdIndicators: {},       // {key:{rsi,macd,...}}
  alarms: LS.get('alarms', []),
  news: [], newsLoading:false, newsLoaded:false,
  ndKey: LS.get('ndKey',''),
  bankYd: LS.get('bankYd','yatirimdunyam://'),
  bankYkb: LS.get('bankYkb','ykbmobil://'),
  detailKey: null,        // detay modalında açık varlık
  chartPeriod: 'tum',     // grafik dönemi: hafta|ay|yil|tum
  lastUpdate:null, lastError:null, activeSource:null, auto:false, autoTimer:null
};

/* ---------- Yardımcılar ---------- */
function pick(o,keys){ if(!o) return null; for(const k of keys){ if(o[k]!=null) return o[k]; } return null; }
function num(x){ if(x==null) return null; if(typeof x==='number') return x;
  let s=String(x).replace(/[$%\s₺€£]/g,'').replace(/\.(?=\d{3}(\D|$))/g,'').replace(',','.').replace(/[^\d.\-]/g,'');
  const n=parseFloat(s); return isNaN(n)?null:n; }
function fmt(n,dec=2){ if(n==null||isNaN(n)) return '–'; return n.toLocaleString('tr-TR',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function fmtPrice(key,n){ const c=catalogOf(key); const u=c?c.unit:''; if(n==null) return '–';
  return (u==='$'?'$':'')+fmt(n)+(u==='₺'?' ₺':''); }
function catalogOf(key){ if(key.startsWith('bist:')) return {name:key.slice(5), tag:'BIST Hisse', type:'bist', unit:'₺'}; return CATALOG[key]||null; }
function isBist(key){ return key.startsWith('bist:'); }
function bistSym(key){ return key.slice(5); }

/* =====================================================================
   VERİ ÇEKME
   ===================================================================== */
const GOLD_SOURCES = [
  {n:'v5', url:'https://finans.truncgil.com/v5/today.json', px:null},
  {n:'v4', url:'https://finans.truncgil.com/v4/today.json', px:null},
  {n:'v3', url:'https://finans.truncgil.com/v3/today.json', px:null},
  {n:'v5+allorigins', url:'https://finans.truncgil.com/v5/today.json', px:'allorigins'},
  {n:'v3+allorigins', url:'https://finans.truncgil.com/v3/today.json', px:'allorigins'},
  {n:'v5+corsproxy', url:'https://finans.truncgil.com/v5/today.json', px:'corsproxy'},
];
function proxify(u,kind){ if(kind==='corsproxy') return 'https://corsproxy.io/?url='+encodeURIComponent(u);
  return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u); }

function normalizeGold(j){
  const root=j.Rates||j.rates||j;
  const out={};
  for(const key in CATALOG){
    const c=CATALOG[key]; if(c.type==='bist') continue;
    const raw=pick(root,c.tkeys);
    if(raw && typeof raw==='object'){
      const buy=num(pick(raw,['Buying','Alış','alis','buying','Alis']));
      const sell=num(pick(raw,['Selling','Satış','satis','selling','Satis']));
      const chg=num(pick(raw,['Change','change','Değişim','degisim']));
      if(buy!=null||sell!=null) out[key]={buy,sell:sell??buy,change:chg};
    }
  }
  return out;
}

async function fetchGold(){
  const errs=[];
  for(const src of GOLD_SOURCES){
    try{
      const url=src.px?proxify(src.url,src.px):src.url;
      const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),9000);
      const r=await fetch(url,{cache:'no-store',signal:ctrl.signal}); clearTimeout(to);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const j=await r.json();
      const norm=normalizeGold(j);
      if(norm.gram_altin?.sell!=null||norm.usd?.sell!=null){
        S.metalData=norm; S.activeSource='truncgil-'+src.n;
        // geçmişe işle (yedek seri)
        for(const k in norm){ recordPoint(k, norm[k].sell); }
        return true;
      }
      throw new Error('biçim tanınmadı');
    }catch(e){ errs.push(src.n+':'+(e.message||e)); }
  }
  // Yedek: anahtarsız döviz (altın yoksa bile dolar/euro gelsin)
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    if(r.ok){ const j=await r.json(); const t=j.rates?.TRY, e=j.rates?.EUR?1/j.rates.EUR:null;
      const norm={};
      if(t){ norm.usd={buy:t,sell:t,change:null}; recordPoint('usd',t); }
      if(t&&e){ const eu=t*e; norm.eur={buy:eu,sell:eu,change:null}; recordPoint('eur',eu); }
      if(norm.usd){ S.metalData=norm; S.activeSource='er-api(yedek/sadece döviz)';
        S.lastError='Altın kaynağına ulaşılamadı, şimdilik yalnızca döviz var. ['+errs.join(' | ')+']';
        return true; }
    }
  }catch(e){ errs.push('er-api:'+(e.message||e)); }
  S.lastError=errs.join(' | ');
  return false;
}

/* NosyAPI: BIST hisseleri için anlık fiyat + gün içi min/max.
   NosyAPI geçmiş zaman serisi vermez; göstergeler için cihaz-içi
   geçmiş biriktirme kullanılır (her yenilemede fiyat kaydedilir). */
async function fetchBist(sym){
  if(!S.ndKey) return {error:'no-key'};
  try{
    const url=`https://www.nosyapi.com/apiv2/service/economy/bist/exchange-rate?apiKey=${encodeURIComponent(S.ndKey)}&code=${encodeURIComponent(sym)}`;
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),9000);
    const r=await fetch(url,{cache:'no-store',signal:ctrl.signal}); clearTimeout(to);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.status && j.status!=='success') return {error: j.messageTR||j.message||'API hatası'};
    const row = Array.isArray(j.data) ? j.data.find(d=>(d.code||'').toUpperCase()===sym.toUpperCase()) || j.data[0] : null;
    if(!row) return {error:'hisse bulunamadı (kod: '+sym+')'};
    return {
      price: num(row.latest ?? row.selling ?? row.buying),
      change: num(row.changeRate),
      name: row.ShortName || sym,
      dayMin: num(row.dayMin), dayMax: num(row.dayMax),
      high: num(row.highestPrice), low: num(row.lowestPrice)
    };
  }catch(e){ return {error: e.name==='AbortError'?'zaman aşımı':(e.message||String(e))}; }
}

function recordPoint(key,v){
  if(v==null) return;
  if(!S.series[key]) S.series[key]=[];
  const arr=S.series[key], t=Date.now();
  if(!arr.length || arr[arr.length-1].v!==v) arr.push({t,v});
  if(arr.length>300) arr.splice(0,arr.length-300);
  LS.set('series',S.series);
}

/* Bir varlığın gösterge hesaplamaları için kapanış serisini döndür.
   Tüm varlıklar için cihaz-içi biriktirilen seri kullanılır. */
function closesFor(key){
  return (S.series[key]||[]).map(p=>p.v);
}

/* Dönem filtresi: seçili döneme göre {t,v} noktalarını süzer.
   period: 'hafta' (7g) | 'ay' (30g) | 'yil' (365g) | 'tum' */
const PERIOD_DAYS = {hafta:7, ay:30, yil:365, tum:99999};
function seriesForPeriod(key, period){
  const arr = S.series[key]||[];
  if(!arr.length) return [];
  const days = PERIOD_DAYS[period] ?? 99999;
  const cutoff = Date.now() - days*24*60*60*1000;
  const filtered = arr.filter(p=>p.t>=cutoff);
  // o dönemde hiç veri yoksa, en azından mevcut tüm veriyi göster
  return filtered.length>=2 ? filtered : arr;
}

/* =====================================================================
   TEKNİK ANALİZ MOTORU
   ===================================================================== */
function sma(a,n){ if(a.length<n) return null; let s=0; for(let i=a.length-n;i<a.length;i++)s+=a[i]; return s/n; }
function ema(a,n){ if(a.length<n) return null; const k=2/(n+1); let e=a[0]; for(let i=1;i<a.length;i++)e=a[i]*k+e*(1-k); return e; }
function rsi(a,n=14){
  if(a.length<n+1) return null;
  let g=0,l=0;
  for(let i=a.length-n;i<a.length;i++){ const d=a[i]-a[i-1]; if(d>=0)g+=d; else l-=d; }
  if(l===0) return 100; if(g===0) return 0;
  const rs=(g/n)/(l/n); return 100-100/(1+rs);
}
function macd(a){
  if(a.length<26) return null;
  const e12=ema(a,12), e26=ema(a,26);
  if(e12==null||e26==null) return null;
  const line=e12-e26;
  // sinyal: son 9 MACD değerinin EMA'sı (yaklaşık)
  const macdSeries=[];
  for(let i=26;i<=a.length;i++){ const slice=a.slice(0,i); const m=ema(slice,12)-ema(slice,26); macdSeries.push(m); }
  const signal=ema(macdSeries,9);
  return {line, signal, hist:line-(signal??line)};
}
/* Basit destek/direnç: son N kapanışın en düşük/en yüksek bölgeleri */
function supportResistance(a){
  if(a.length<10) return null;
  const recent=a.slice(-30);
  const lo=Math.min(...recent), hi=Math.max(...recent);
  const price=a[a.length-1];
  // mesafe yüzdesi
  const toSup=((price-lo)/price*100), toRes=((hi-price)/price*100);
  return {support:lo, resistance:hi, toSupPct:toSup, toResPct:toRes};
}
function trendOf(a){
  const s5=sma(a,5), s20=sma(a,20), s50=sma(a,50);
  return {s5,s20,s50};
}

/* =====================================================================
   ANALİZ + KURAL-TABANLI YORUM
   Çıktı: {ready, price, rsi, macd, sr, trend, score, verdict, reasons[], summary}
   verdict: 'buy' | 'sell' | 'neutral'  (OLASILIKSAL — kesin tahmin değil)
   ===================================================================== */
function analyze(key){
  const a=closesFor(key);
  const price=a.length?a[a.length-1]:(metalSell(key));
  if(a.length<6) return {ready:false, points:a.length, price};
  const r=rsi(a,14);
  const m=macd(a);
  const sr=supportResistance(a);
  const tr=trendOf(a);
  let score=0; const reasons=[];

  // RSI
  if(r!=null){
    if(r>=70){ score-=2; reasons.push(['neg',`RSI ${r.toFixed(0)} — aşırı alım bölgesi. Tarihsel olarak bu seviyelerde düzeltme olasılığı artar.`]); }
    else if(r<=30){ score+=2; reasons.push(['pos',`RSI ${r.toFixed(0)} — aşırı satım bölgesi. Bu seviyeler sıklıkla tepki alımı getirir.`]); }
    else if(r>55){ score-=0.5; reasons.push(['neu',`RSI ${r.toFixed(0)} — yukarı yönlü ama henüz aşırı değil.`]); }
    else if(r<45){ score+=0.5; reasons.push(['neu',`RSI ${r.toFixed(0)} — aşağı yönlü ama henüz aşırı değil.`]); }
    else { reasons.push(['neu',`RSI ${r.toFixed(0)} — nötr bölge.`]); }
  }
  // Hareketli ortalamalar
  if(tr.s5!=null && tr.s20!=null){
    if(tr.s5>tr.s20){ score+=1; reasons.push(['pos','Kısa ortalama (5g) orta ortalamanın (20g) üzerinde — kısa vadeli eğilim yukarı.']); }
    else { score-=1; reasons.push(['neg','Kısa ortalama (5g) orta ortalamanın (20g) altında — kısa vadeli eğilim aşağı.']); }
  }
  if(tr.s50!=null && price!=null){
    if(price>tr.s50){ score+=0.5; reasons.push(['pos','Fiyat 50 günlük ortalamanın üzerinde — orta vadeli görünüm pozitif.']); }
    else { score-=0.5; reasons.push(['neg','Fiyat 50 günlük ortalamanın altında — orta vadeli görünüm zayıf.']); }
  }
  // MACD
  if(m){
    if(m.line>m.signal){ score+=1; reasons.push(['pos','MACD sinyal çizgisinin üzerinde — momentum yukarı.']); }
    else { score-=1; reasons.push(['neg','MACD sinyal çizgisinin altında — momentum aşağı.']); }
  }
  // Destek/Direnç
  if(sr){
    if(sr.toSupPct<2){ score+=1; reasons.push(['pos',`Fiyat destek bölgesine çok yakın (%${sr.toSupPct.toFixed(1)}). Buradan dönüş gelirse alım fırsatı olabilir.`]); }
    if(sr.toResPct<2){ score-=1; reasons.push(['neg',`Fiyat direnç bölgesine çok yakın (%${sr.toResPct.toFixed(1)}). Geçemezse geri çekilme riski var.`]); }
  }

  // Eşik: belirgin yön için ±2, zayıf eğilim için ±1
  let verdict = score>=2?'buy':score<=-2?'sell':'neutral';
  // Aşırı bölgeler özel durum: RSI çok yüksek + dirençte = net temkin; çok düşük + destekte = net fırsat
  if(r!=null){
    if(r>=72 && sr && sr.toResPct<3) verdict='sell';
    if(r<=28 && sr && sr.toSupPct<3) verdict='buy';
  }
  const summary = buildSummary(key, verdict, r, sr, score);
  return {ready:true, price, rsi:r, macd:m, sr, trend:tr, score, verdict, reasons, summary, points:a.length};
}

function metalSell(key){
  if(isBist(key)) return S.bistData[bistSym(key)]?.price ?? null;
  return S.metalData?.[key]?.sell ?? null;
}

function buildSummary(key, verdict, r, sr, score){
  const name=catalogOf(key)?.name||key;
  const price=metalSell(key);
  // Eyleme yönelik seviye önerileri (destek/direnç temelli)
  let levels='';
  if(sr && price){
    if(verdict==='buy'){
      levels=` İzlenecek seviyeler: destek ~${fmt(sr.support)} (bu seviye korunursa alım tezi güçlenir), direnç ~${fmt(sr.resistance)} (ilk hedef bölge). Destek kırılırsa tez bozulur — stop için destek altını referans al.`;
    } else if(verdict==='sell'){
      levels=` İzlenecek seviyeler: direnç ~${fmt(sr.resistance)} (aşılamazsa satış baskısı sürebilir), destek ~${fmt(sr.support)} (geri çekilmede ilk durak). Direnç yukarı kırılırsa temkinli senaryo zayıflar.`;
    } else {
      levels=` Bant: destek ~${fmt(sr.support)} – direnç ~${fmt(sr.resistance)}. Net yön için fiyatın bu banttan hangi yöne kırdığını izle.`;
    }
  }
  if(verdict==='buy'){
    let s=`${name} için teknik tablo ağırlıklı OLUMLU. `;
    if(r!=null && r<=30) s+=`Fiyat aşırı satım bölgesinde (RSI ${r.toFixed(0)}) — tarihsel olarak bu bölgeler tepki alımı için elverişlidir. `;
    else if(r!=null) s+=`RSI ${r.toFixed(0)}, momentum yukarı yönlü. `;
    if(sr && sr.toSupPct<2) s+=`Fiyat desteğe çok yakın; buradan dönüş başlarsa risk/ödül oranı alım lehine. `;
    s+=`Bir analist bu tabloda "kademeli alım / pozisyon biriktirme" senaryosunu değerlendirebilir.`;
    s+=levels;
    s+=` ⚠️ Bu kesin yükseliş garantisi DEĞİLDİR; olasılık değerlendirmesidir. Pozisyon büyüklüğünü ve stop seviyeni kendin belirle.`;
    return s;
  }
  if(verdict==='sell'){
    let s=`${name} için teknik tablo ağırlıklı TEMKİNLİ. `;
    if(r!=null && r>=70) s+=`Fiyat aşırı alım bölgesinde (RSI ${r.toFixed(0)}) — bu bölgelerde düzeltme riski tarihsel olarak yüksektir. `;
    else if(r!=null) s+=`RSI ${r.toFixed(0)}, momentum zayıflıyor. `;
    if(sr && sr.toResPct<2) s+=`Fiyat dirence yapışmış; aşamazsa geri çekilme olasılığı artar. `;
    s+=`Bir analist bu tabloda "kâr realizasyonu / yeni alımda acele etmeme" senaryosunu değerlendirebilir.`;
    s+=levels;
    s+=` ⚠️ Bu kesin düşüş tahmini DEĞİLDİR; olasılık değerlendirmesidir. Mevcut pozisyonun varsa stop seviyeni gözden geçir.`;
    return s;
  }
  let s=`${name} için göstergeler KARIŞIK; baskın bir yön yok. Trend, momentum ve seviyeler net bir kurulum oluşturmuyor.`;
  s+=levels;
  s+=` Böyle dönemlerde acele pozisyon yerine kırılımı beklemek çoğu analistin tercihidir.`;
  return s;
}

/* Verdict etiketleri */
const VERDICT_TXT={buy:'ALIM EĞİLİMİ', sell:'SATIŞ / TEMKİN', neutral:'NÖTR — BEKLE'};

/* =====================================================================
   HABER TARAMA  (kamuya açık RSS → JSON köprüsü)
   ===================================================================== */
const NEWS_FEEDS=[
  {name:'BloombergHT', url:'https://www.bloomberght.com/rss'},
];
const KW={
  'Altın':['altın','altin','ons','gram altın','xau','kıymetli maden','darphane','kıymetli'],
  'Gümüş':['gümüş','gumus','silver'],
  'Döviz':['dolar','euro','kur','tcmb','faiz','fed','enflasyon','usd','eur','merkez bankası'],
  'Borsa':['borsa','bist','hisse','endeks','nasdaq','s&p','dax','xu100'],
};
const POS=['yüksel','arttı','artış','rekor','kazanç','toparlan','güçlü','prim','ralli','çıktı','zirve','olumlu','destek buldu'];
const NEG=['düş','geriled','kayıp','zayıf','satış baskısı','risk','endişe','baskı','geriliyor','çakıldı','dipte','olumsuz','kaybetti'];
function classifyNews(title){
  const t=(title||'').toLowerCase();
  const cats=[]; for(const c in KW){ if(KW[c].some(k=>t.includes(k))) cats.push(c); }
  let sc=0; POS.forEach(p=>{if(t.includes(p))sc++}); NEG.forEach(n=>{if(t.includes(n))sc--});
  return {cats, tone: sc>0?'pos':sc<0?'neg':'neu'};
}
async function fetchNews(){
  S.newsLoading=true; if(S.tab==='news') render();
  const all=[];
  for(const f of NEWS_FEEDS){
    try{
      const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(f.url));
      if(!r.ok) continue;
      const j=await r.json();
      (j.items||[]).forEach(it=>{ const c=classifyNews(it.title); if(c.cats.length) all.push({title:it.title,link:it.link,date:it.pubDate,src:f.name,...c}); });
    }catch(e){ /* sessiz geç */ }
  }
  const seen=new Set();
  S.news=all.filter(n=>{ if(seen.has(n.title)) return false; seen.add(n.title); return true; })
            .sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,40);
  S.newsLoading=false; S.newsLoaded=true;
  if(S.tab==='news') render();
}
/* Belirli bir varlık için haber tonu özeti (analiz ekranında kullanılır) */
function newsToneFor(catName){
  const items=S.news.filter(n=>n.cats.includes(catName));
  if(!items.length) return null;
  const p=items.filter(n=>n.tone==='pos').length, ng=items.filter(n=>n.tone==='neg').length;
  return {count:items.length, pos:p, neg:ng, mood: p>ng?'pozitif':ng>p?'olumsuz':'karışık'};
}

/* =====================================================================
   ALARMLAR
   tip: 'price' (seviye) | 'signal' (teknik sinyal değişimi)
   ===================================================================== */
function checkAlarms(){
  let fired=[];
  S.alarms.forEach(al=>{
    if(al.triggered) return;
    if(al.type==='price'){
      const v=metalSell(al.key); if(v==null) return;
      const hit=(al.dir==='above'&&v>=al.value)||(al.dir==='below'&&v<=al.value);
      if(hit){ al.triggered=true; al.firedAt=new Date().toLocaleString('tr-TR'); fired.push({al,v}); }
    } else if(al.type==='signal'){
      const an=analyze(al.key); if(!an.ready) return;
      if(al.want===an.verdict && an.verdict!=='neutral'){
        al.triggered=true; al.firedAt=new Date().toLocaleString('tr-TR'); fired.push({al, v:an.price, an}); }
    }
  });
  if(fired.length){ LS.set('alarms',S.alarms); fired.forEach(f=>notify(f)); }
}
function notify({al,v,an}){
  const name=catalogOf(al.key)?.name||al.key;
  let msg;
  if(al.type==='price'){ msg=`${name} ${fmt(al.value)} ${al.dir==='above'?'üzerine çıktı':'altına indi'} · Şu an ${fmt(v)}`; }
  else { msg=`${name}: ${VERDICT_TXT[al.want]} sinyali oluştu · Şu an ${fmt(v)}`; }
  if('Notification' in window && Notification.permission==='granted') new Notification('Piyasa Alarmı', {body:msg});
  if(navigator.vibrate) navigator.vibrate([180,90,180]);
  showBanner(msg);
}
function showBanner(msg){
  const old=document.getElementById('banner'); if(old) old.remove();
  const b=document.createElement('div'); b.className='banner'; b.id='banner';
  b.innerHTML=`<div>${msg}</div><div class="ba">
    <button style="background:#1a1400;color:var(--gold)" onclick="openBank('yd')">Yatırım Dünyam</button>
    <button style="background:rgba(0,0,0,.15);color:#1a1400" onclick="document.getElementById('banner').remove()">Kapat</button></div>`;
  document.body.appendChild(b);
  setTimeout(()=>{ const x=document.getElementById('banner'); if(x)x.remove(); }, 12000);
}

function setStatus(s){

function sparkSVG(key,h=44){
  const a=closesFor(key);
  if(a.length<2) return '';
  const w=300, min=Math.min(...a), max=Math.max(...a), rng=(max-min)||1;
  const pts=a.map((v,i)=>`${(i/(a.length-1))*w},${h-((v-min)/rng)*(h-4)-2}`).join(' ');
  const up=a[a.length-1]>=a[0];
  const col=up?'var(--up)':'var(--down)';
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function bigChart(key, period){
  period = period || S.chartPeriod || 'tum';
  const pts0 = seriesForPeriod(key, period);
  const a = pts0.map(p=>p.v);
  if(a.length<3) return `<div class="note">Bu dönem için yeterli veri yok. ${isBist(key)?'NosyAPI anahtarı giriliyse veri birikene kadar bekle.':'Uygulamayı kullandıkça cihazda geçmiş birikir; haftalık/aylık/yıllık görünümler zamanla dolar.'}</div>`;
  const w=320,h=150,pad=4;
  const min=Math.min(...a), max=Math.max(...a), rng=(max-min)||1;
  const avg=a.reduce((x,y)=>x+y,0)/a.length;
  const X=i=>pad+(i/(a.length-1))*(w-2*pad);
  const Y=v=>pad+(1-(v-min)/rng)*(h-2*pad);
  const line=a.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
  const area=`${pad},${h-pad} `+line+` ${w-pad},${h-pad}`;
  const up=a[a.length-1]>=a[0]; const col=up?'#3dd68c':'#ff6b81';
  // dönem ortalama çizgisi (yatay)
  const avgY=Y(avg);
  const avgLine=`<line x1="${pad}" y1="${avgY}" x2="${w-pad}" y2="${avgY}" stroke="var(--gold)" stroke-width="1.2" stroke-dasharray="4 3" opacity=".75"/>`;
  const gid='g_'+key.replace(/\W/g,'')+'_'+period;
  // dönem değişim yüzdesi
  const chgPct = a.length>=2 ? ((a[a.length-1]-a[0])/a[0]*100) : 0;
  const periodLabel={hafta:'Haftalık',ay:'Aylık',yil:'Yıllık',tum:'Tümü'}[period];
  return `<div class="chartbox"><svg class="chart" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".22"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#${gid})"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>
    ${avgLine}
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:8px">
    <span style="color:var(--muted)">${periodLabel} ort: <b style="color:var(--gold)">${fmt(avg)}</b></span>
    <span style="color:${chgPct>=0?'var(--up)':'var(--down)'}">${chgPct>=0?'+':''}${chgPct.toFixed(2)}% (${a.length} veri)</span>
  </div></div>`;
}

  if(S.lastError && !S.metalData){
    h+=`<div class="card warn"><div class="row"><b style="color:var(--down)">Veri alınamadı</b></div>
      <div class="note warn" style="margin-top:8px">Kaynaklara ulaşılamadı. Birkaç saniye sonra sağ alttaki yenile düğmesine tekrar bas. İnternet bağlantını kontrol et.<br><br><span style="font-size:10px;opacity:.7">Teknik: ${S.lastError}</span></div></div>`;
  }
  if(!S.favorites.length){
    h+=`<div class="empty"><div class="big">Takip listen boş</div>Altın, gümüş veya BIST hisselerini favorilerine ekle, hepsini tek ekranda izle.<br><br><button class="btn" id="addFav1">+ Favori Ekle</button></div>`;
    return h;
  }
  h+=`<div class="row" style="margin:2px 2px 12px"><div class="section-label" style="margin:0">Takip Listesi</div><button class="btn ghost sm" id="addFav">+ Ekle</button></div>`;
  S.favorites.forEach(key=>{
    const c=catalogOf(key); if(!c) return;
    let price, change, err=null;
    if(isBist(key)){ const d=S.bistData[bistSym(key)]; if(d&&d.error){err=d.error;} else { price=d?.price; change=d?.change; } }
    else { const d=S.metalData?.[key]; price=d?.sell; change=d?.change; }
    const an=analyze(key);
    const vClass=an.ready?an.verdict:'neutral';
    const chgC=change==null?'flat':change>0?'up':change<0?'down':'flat';
    const chgT=change==null?'—':(change>0?'+':'')+fmt(change)+'%';
    h+=`<div class="card tap" data-detail="${key}">
      <div class="fav-head">
        <div><div class="fav-name">${c.name}</div><div class="fav-tag">${c.tag}</div></div>
        <div style="text-align:right"><div class="chg ${chgC}">${chgT}</div></div>
      </div>`;
    if(err){ h+=`<div class="note warn" style="margin-top:8px">Bu hisse alınamadı: ${err}. NosyAPI anahtarını ve hisse kodunu kontrol et.</div>`; }
    else {
      h+=`<div class="row" style="align-items:flex-end"><div class="fav-price tnum">${fmtPrice(key,price)}</div>`;
      if(an.ready) h+=`<span class="verdict ${vClass}"><span class="dotv"></span>${VERDICT_TXT[an.verdict]}</span>`;
      h+=`</div>`;
      h+=sparkSVG(key);
    }
    h+=`</div>`;
  });
  h+=`<div class="disc">Veriler ~dakikalık gecikmeli olabilir. Sinyaller olasılıksaldır, yatırım tavsiyesi değildir.</div>`;
  return h;
}

/* =====================================================================
   EKRAN: ANALİZ  (favori seç → detaylı)
   ===================================================================== */
function viewAnalysis(){
  if(!S.favorites.length) return `<div class="empty"><div class="big">Önce favori ekle</div>Analiz için Takip sekmesinden bir varlık ekle.</div>`;
  let h=`<div class="section-label" style="margin-top:2px">Detaylı Analiz</div>`;
  h+=`<div class="note" style="margin-bottom:14px">Her kart, o varlık için teknik göstergeleri okuyup <b>olasılıksal</b> bir eğilim çıkarır. "ALIM eğilimi" kesin yükselecek demek değildir; göstergelerin o an ağırlıklı sinyalidir. Karar ve risk yönetimi sana aittir.</div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn sec block" onclick="openBank('yd')">📈 Yatırım Dünyam</button><button class="btn sec block" onclick="openBank('ykb')">🏦 Yapı Kredi</button></div>`;
  S.favorites.forEach(key=>{
    const c=catalogOf(key); if(!c) return;
    const an=analyze(key);
    h+=`<div class="card" style="cursor:pointer" data-detail="${key}"><div class="fav-head"><div><div class="fav-name">${c.name}</div><div class="fav-tag">${c.tag}</div></div>`;
    if(an.ready) h+=`<span class="verdict ${an.verdict}"><span class="dotv"></span>${VERDICT_TXT[an.verdict]}</span>`;
    h+=`</div>`;
    if(an.ready){
      h+=`<div class="metric" style="margin-top:11px;background:none;border:none;padding:0"><div style="font-size:13px;color:var(--text);line-height:1.55">${an.summary}</div></div>
      <div style="font-size:11px;color:var(--gold);margin-top:10px;font-weight:600">Detay için dokun →</div>`;
    } else {
      h+=`<div class="note" style="margin-top:10px">Analiz için yeterli veri yok (${an.points||0} veri). ${isBist(key)?'NosyAPI anahtarı gir.':'Birkaç kez yenile, cihazda birikecek.'}</div>`;
    }
    h+=`</div>`;
  });
  return h;
}

/* DETAY MODALI */
function openDetail(key){ S.detailKey=key; renderDetail(); }
window.openDetail=openDetail;
function closeDetail(){ S.detailKey=null; const m=document.getElementById('modal'); if(m)m.remove(); }
window.closeDetail=closeDetail;
function renderDetail(){
  const old=document.getElementById('modal'); if(old) old.remove();
  const key=S.detailKey; if(!key) return;
  const c=catalogOf(key); const an=analyze(key);
  const price=metalSell(key);
  let body=`<div class="grab"></div><div class="row"><h3 style="margin:0">${c.name}</h3><button class="btn sec sm" onclick="closeDetail()">Kapat</button></div>`;
  body+=`<div class="fav-tag" style="margin-bottom:12px">${c.tag}</div>`;
  body+=`<div class="row" style="align-items:flex-end;margin-bottom:8px"><div class="fav-price tnum" style="font-size:30px">${fmtPrice(key,price)}</div>`;
  if(an.ready) body+=`<span class="verdict ${an.verdict}"><span class="dotv"></span>${VERDICT_TXT[an.verdict]}</span>`;
  body+=`</div>`;
  body+=`<div class="chip-row" style="margin-bottom:10px">
    ${['hafta','ay','yil','tum'].map(p=>{
      const lbl={hafta:'Haftalık',ay:'Aylık',yil:'Yıllık',tum:'Tümü'}[p];
      return `<span class="chip ${S.chartPeriod===p?'gold':''}" onclick="setChartPeriod('${p}')">${lbl}</span>`;
    }).join('')}
  </div>`;
  body+=bigChart(key, S.chartPeriod);
  if(an.ready){
    // metrik kartları
    body+=`<div class="metrics" style="margin-top:12px">`;
    if(an.rsi!=null){ const rc=an.rsi>=70?'var(--down)':an.rsi<=30?'var(--up)':'var(--neutral)';
      body+=`<div class="metric"><div class="ml">RSI (14)</div><div class="mv tnum" style="color:${rc}">${an.rsi.toFixed(1)}</div><div class="ms" style="color:${rc}">${an.rsi>=70?'Aşırı alım':an.rsi<=30?'Aşırı satım':'Nötr'}</div>
        <div class="gauge"><div class="fill" style="width:${Math.min(100,an.rsi)}%;background:${rc}"></div></div></div>`; }
    if(an.macd){ const mc=an.macd.line>an.macd.signal?'var(--up)':'var(--down)';
      body+=`<div class="metric"><div class="ml">MACD</div><div class="mv tnum" style="color:${mc}">${an.macd.line>an.macd.signal?'Pozitif':'Negatif'}</div><div class="ms" style="color:var(--muted)">${an.macd.line>an.macd.signal?'Sinyal üstünde':'Sinyal altında'}</div></div>`; }
    if(an.trend.s20!=null){ const tc=price>an.trend.s20?'var(--up)':'var(--down)';
      body+=`<div class="metric"><div class="ml">20g Ortalama</div><div class="mv tnum">${fmt(an.trend.s20)}</div><div class="ms" style="color:${tc}">Fiyat ${price>an.trend.s20?'üstünde':'altında'}</div></div>`; }
    if(an.sr){ body+=`<div class="metric"><div class="ml">Destek / Direnç</div><div class="mv tnum" style="font-size:14px">${fmt(an.sr.support)} / ${fmt(an.sr.resistance)}</div><div class="ms" style="color:var(--muted)">Desteğe %${an.sr.toSupPct.toFixed(1)}</div></div>`; }
    body+=`</div>`;
    // yorum
    body+=`<div class="section-label">Yorum</div><div class="note" style="font-size:13px;color:var(--text)">${an.summary}</div>`;
    // gerekçeler
    body+=`<div class="section-label">Göstergeler ne diyor</div><div class="card" style="margin:0">`;
    an.reasons.forEach(([t,txt])=>{ const ic=t==='pos'?'+':t==='neg'?'−':'~';
      body+=`<div class="reason"><span class="ic ${t}">${ic}</span><span>${txt}</span></div>`; });
    body+=`</div>`;
  } else {
    body+=`<div class="note" style="margin-top:12px">Analiz için yeterli geçmiş veri yok. ${isBist(key)?'NosyAPI anahtarı girip yenile.':'Birkaç kez yenileyince cihazda birikir.'}</div>`;
  }
  // hızlı alarm
  body+=`<div class="section-label">Hızlı alarm kur</div>
    <div style="display:flex;gap:8px"><button class="btn sec block sm" onclick="quickAlarm('${key}','signal','buy')">Alım sinyali verince</button>
    <button class="btn sec block sm" onclick="quickAlarm('${key}','signal','sell')">Satış sinyali verince</button></div>`;
  body+=`<div style="display:flex;gap:8px;margin-top:8px"><button class="btn ghost block sm" onclick="openBank('yd')">Yatırım Dünyam'ı aç</button></div>`;

  const m=document.createElement('div'); m.className='modal-bg'; m.id='modal';
  m.innerHTML=`<div class="modal">${body}</div>`;
  m.addEventListener('click',e=>{ if(e.target===m) closeDetail(); });
  document.body.appendChild(m);
}
function setChartPeriod(p){
  S.chartPeriod=p;
  renderDetail();  // modalı yeniden çiz (seçili dönemle)
}
window.setChartPeriod=setChartPeriod;
function quickAlarm(key,type,want){
  S.alarms.push({key,type,want,triggered:false});
  LS.set('alarms',S.alarms);
  closeDetail(); showBanner('Alarm kuruldu: '+(catalogOf(key)?.name)+' '+VERDICT_TXT[want]);
}
window.quickAlarm=quickAlarm;

/* =====================================================================
   EKRAN: HABER
   ===================================================================== */
function viewNews(){
  let h=`<div class="note" style="margin:2px 0 14px">Kamuya açık finans haberi başlıklarını tarar; altın, gümüş, döviz ve borsa konularını filtreler, kaba bir olumlu/olumsuz ton işaretler. Banka raporları (login/PDF arkasında, telifli) taranmaz.</div>`;
  if(S.newsLoading) return h+`<div class="empty"><span class="spin"></span> Haberler taranıyor…</div>`;
  if(!S.news.length) return h+`<div class="empty"><div class="big">Haber yok</div>Aşağıdan taramayı başlat.<br><br><button class="btn" id="loadNews">Haberleri Tara</button></div>`;
  // altın tonu özeti
  const gt=newsToneFor('Altın');
  if(gt){ const cls=gt.mood==='pozitif'?'buy':gt.mood==='olumsuz'?'sell':'neutral';
    h+=`<div class="card"><div class="fav-tag">Altın haber tonu — son ${gt.count} başlık</div>
      <div class="verdict ${cls}" style="margin-top:8px"><span class="dotv"></span>${gt.mood.toUpperCase()}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px">${gt.pos} olumlu · ${gt.neg} olumsuz. Yalnızca başlık taramasıdır, derin analiz değildir.</div></div>`; }
  h+=`<button class="btn sec block sm" id="loadNews" style="margin-bottom:12px">Yenile</button>`;
  S.news.forEach(n=>{
    const d=n.date?new Date(n.date).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    h+=`<a class="news-item" href="${n.link}" target="_blank" rel="noopener">
      <div class="news-title">${n.title}</div>
      <div class="news-meta"><span class="tone ${n.tone}">${n.tone==='pos'?'+':n.tone==='neg'?'−':'~'}</span>${n.cats.join(' · ')} · ${d}</div></a>`;
  });
  return h;
}

/* =====================================================================
   EKRAN: ALARM
   ===================================================================== */
function viewAlarms(){
  const opts=S.favorites.map(k=>`<option value="${k}">${catalogOf(k)?.name||k}</option>`).join('');
  let h=`<div class="section-label" style="margin-top:2px">Yeni Alarm</div>
  <div class="card">
    <label class="fld">Varlık</label>
    <select id="alKey" style="margin-bottom:10px">${opts||'<option>Önce favori ekle</option>'}</select>
    <label class="fld">Alarm türü</label>
    <select id="alType" style="margin-bottom:10px" onchange="document.getElementById('alPriceRow').style.display=this.value==='price'?'block':'none';document.getElementById('alSignalRow').style.display=this.value==='signal'?'block':'none';">
      <option value="price">Belirli fiyat seviyesi</option>
      <option value="signal">Teknik sinyal oluşunca</option>
    </select>
    <div id="alPriceRow">
      <label class="fld">Koşul</label>
      <select id="alDir" style="margin-bottom:10px"><option value="below">Şu fiyatın ALTINA inince (alım fırsatı)</option><option value="above">Şu fiyatın ÜSTÜNE çıkınca (satış/kâr)</option></select>
      <label class="fld">Fiyat</label>
      <input id="alValue" type="number" inputmode="decimal" placeholder="örn. 2400" style="margin-bottom:10px">
    </div>
    <div id="alSignalRow" style="display:none">
      <label class="fld">Hangi sinyal?</label>
      <select id="alWant" style="margin-bottom:10px"><option value="buy">Alım eğilimi oluşunca</option><option value="sell">Satış eğilimi oluşunca</option></select>
    </div>
    <button class="btn block" id="addAlarm">Alarmı Kur</button>
  </div>`;
  h+=`<div class="section-label">Kurulu Alarmlar</div>`;
  if(!S.alarms.length){ h+=`<div class="empty">Henüz alarm yok.</div>`; }
  else { S.alarms.forEach((al,i)=>{
    const name=catalogOf(al.key)?.name||al.key;
    let cond = al.type==='price'
      ? `${name} ${al.dir==='above'?'≥':'≤'} ${fmt(al.value)}`
      : `${name} · ${VERDICT_TXT[al.want]}`;
    h+=`<div class="alarm-item ${al.triggered?'done':''}">
      <div><div class="alarm-cond">${cond}${al.triggered?' ✓':''}</div>
      <div class="alarm-sub">${al.triggered?('Tetiklendi: '+al.firedAt):(al.type==='price'?'Fiyat alarmı':'Sinyal alarmı')}</div></div>
      <span class="del" data-delalarm="${i}">×</span></div>`;
  }); }
  h+=`<div class="note">Alarmlar uygulama açıkken (veya yenileme sırasında) kontrol edilir. iOS kısıtı nedeniyle tam 7/24 arka plan bildirimi için ek altyapı gerekir.</div>`;
  return h;
}

/* =====================================================================
   EKRAN: AYARLAR
   ===================================================================== */
function viewSettings(){
  return `
  <div class="section-label" style="margin-top:2px">BIST Hisse Verisi</div>
  <div class="card">
    <label class="fld">NosyAPI Anahtarı</label>
    <input id="ndKey" placeholder="Anahtarını yapıştır" value="${S.ndKey||''}" style="margin-bottom:10px">
    <button class="btn block" id="saveNd">Kaydet</button>
    <div class="note"><b>nosyapi.com</b> → ücretsiz üye ol → "Test Kredisi" ile 50 kredi al → panelden API anahtarını kopyala → buraya yapıştır. BIST hisselerinin fiyatı için gerekli. Altın/gümüş/döviz bu anahtar olmadan da çalışır.<br><br>Not: NosyAPI geçmiş veri vermediği için BIST göstergeleri (RSI/MACD) birkaç gün veri biriktikçe oluşur.</div>
  </div>
  <div class="section-label">Banka Kısayolları</div>
  <div class="card">
    <label class="fld">Yatırım Dünyam URL şeması</label>
    <input id="ydS" value="${S.bankYd||''}" style="margin-bottom:10px">
    <label class="fld">Yapı Kredi URL şeması</label>
    <input id="ykbS" value="${S.bankYkb||''}" style="margin-bottom:10px">
    <button class="btn block" id="saveBank">Kaydet</button>
    <div class="note">Alarm ve analiz ekranındaki "Aç" düğmeleri bunları kullanır. Açılmazsa App Store'a yönlendirir; doğru şemayı bulup buraya yazabilirsin.</div>
  </div>
  <div class="section-label">Bildirimler</div>
  <div class="card">
    <button class="btn block" id="reqNotif">Bildirim İznini Aç</button>
    <div class="note" id="notifS"></div>
  </div>
  <div class="section-label">Otomatik Yenileme</div>
  <div class="card">
    <button class="btn ${S.auto?'':'sec'} block" id="toggleAuto">${S.auto?'Açık — her 60 saniyede':'Kapalı'}</button>
  </div>
  <div class="section-label">Veri</div>
  <div class="card">
    <button class="btn sec block" id="clearData" style="color:var(--down)">Cihazdaki fiyat geçmişini temizle</button>
  </div>
  <div class="disc">Bu uygulama bilgilendirme amaçlıdır, yatırım tavsiyesi değildir. Veriler üçüncü taraf kaynaklardan gelir ve gecikmeli/hatalı olabilir. Alım-satım emirleri yalnızca kendi banka uygulamandan verilir; bu uygulama hiçbir hesabına bağlanmaz.</div>`;
}

/* =====================================================================
   FAVORİ EKLEME MODALI
   ===================================================================== */
function openAddFav(){
  const old=document.getElementById('modal'); if(old) old.remove();
  const metalChips=Object.keys(CATALOG).filter(k=>!S.favorites.includes(k))
    .map(k=>`<span class="chip gold" data-addmetal="${k}">+ ${CATALOG[k].name}</span>`).join('');
  const bistChips=BIST_POPULAR.filter(s=>!S.favorites.includes('bist:'+s))
    .map(s=>`<span class="chip" data-addbist="${s}">+ ${s}</span>`).join('');
  const body=`<div class="grab"></div><div class="row"><h3 style="margin:0">Favori Ekle</h3><button class="btn sec sm" onclick="closeDetail()">Kapat</button></div>
    <div class="section-label">Kıymetli Maden & Döviz</div><div class="chip-row">${metalChips||'<span class="fav-tag">Hepsi ekli</span>'}</div>
    <div class="section-label">Popüler BIST Hisseleri</div><div class="chip-row">${bistChips}</div>
    <div class="section-label">Başka BIST hissesi (sembol gir)</div>
    <div style="display:flex;gap:8px"><input id="customBist" placeholder="örn. THYAO" style="text-transform:uppercase"><button class="btn sm" id="addCustomBist">Ekle</button></div>
    <div class="note">BIST hisseleri için Ayarlar'dan NosyAPI anahtarı girmen gerekir.</div>`;
  const m=document.createElement('div'); m.className='modal-bg'; m.id='modal';
  m.innerHTML=`<div class="modal">${body}</div>`;
  m.addEventListener('click',e=>{ if(e.target===m) closeDetail(); });
  document.body.appendChild(m);
}
window.openAddFav=openAddFav;
function addFav(key){
  if(!S.favorites.includes(key)){ S.favorites.push(key); LS.set('favorites',S.favorites); }
  closeDetail();
  S.tab='watch';  // eklenen varlığı hemen görmesi için Takip'e geç
  document.querySelectorAll('#tabbar button').forEach(x=>x.classList.toggle('active', x.dataset.tab==='watch'));
  refreshAll();
}
window.addFav=addFav;
function removeFav(key){ S.favorites=S.favorites.filter(f=>f!==key); LS.set('favorites',S.favorites); render(); }
window.removeFav=removeFav;

/* =====================================================================
   ETKİLEŞİM BAĞLAMA
   ===================================================================== */
function bindActions(){
  const q=id=>document.getElementById(id);
  // detay açma
  document.querySelectorAll('[data-detail]').forEach(el=>el.addEventListener('click',ev=>{
    if(ev.target.closest('[data-delalarm]')) return;
    openDetail(el.dataset.detail);
  }));
  if(q('addFav')) q('addFav').onclick=openAddFav;
  if(q('addFav1')) q('addFav1').onclick=openAddFav;
  // favori chip ekleme (modal içi)
  document.querySelectorAll('[data-addmetal]').forEach(el=>el.onclick=()=>addFav(el.dataset.addmetal));
  document.querySelectorAll('[data-addbist]').forEach(el=>el.onclick=()=>addFav('bist:'+el.dataset.addbist));
  if(q('addCustomBist')) q('addCustomBist').onclick=()=>{ const s=(q('customBist').value||'').trim().toUpperCase(); if(s) addFav('bist:'+s); };
  // haber
  if(q('loadNews')) q('loadNews').onclick=fetchNews;
  // alarm ekle
  if(q('addAlarm')) q('addAlarm').onclick=()=>{
    const key=q('alKey').value, type=q('alType').value;
    if(!key||key==='Önce favori ekle'){ alert('Önce favori ekle'); return; }
    if(type==='price'){ const value=num(q('alValue').value); if(value==null){ alert('Fiyat gir'); return; }
      S.alarms.push({key,type:'price',dir:q('alDir').value,value,triggered:false}); }
    else { S.alarms.push({key,type:'signal',want:q('alWant').value,triggered:false}); }
    LS.set('alarms',S.alarms); render();
  };
  document.querySelectorAll('[data-delalarm]').forEach(el=>el.onclick=()=>{ S.alarms.splice(+el.dataset.delalarm,1); LS.set('alarms',S.alarms); render(); });
  // ayarlar
  if(q('saveNd')) q('saveNd').onclick=()=>{ S.ndKey=q('ndKey').value.trim(); LS.set('ndKey',S.ndKey); showBanner('Anahtar kaydedildi'); refreshAll(); };
  if(q('saveBank')) q('saveBank').onclick=()=>{ S.bankYd=q('ydS').value.trim(); S.bankYkb=q('ykbS').value.trim(); LS.set('bankYd',S.bankYd); LS.set('bankYkb',S.bankYkb); showBanner('Kaydedildi'); };
  if(q('reqNotif')) q('reqNotif').onclick=async()=>{ if(!('Notification' in window)){ q('notifS').textContent='Bu tarayıcı bildirim desteklemiyor.'; return; } const p=await Notification.requestPermission(); q('notifS').textContent='Durum: '+(p==='granted'?'Açık ✓':p); };
  if(q('notifS')&&'Notification' in window) q('notifS').textContent='Durum: '+(Notification.permission==='granted'?'Açık ✓':Notification.permission);
  if(q('toggleAuto')) q('toggleAuto').onclick=()=>{ S.auto=!S.auto; if(S.auto){ S.autoTimer=setInterval(refreshAll,60000); } else clearInterval(S.autoTimer); render(); };
  if(q('clearData')) q('clearData').onclick=()=>{ if(confirm('Cihazdaki fiyat geçmişi silinsin mi?')){ S.series={}; LS.set('series',{}); showBanner('Geçmiş temizlendi'); } };
}

/* =====================================================================
   BAŞLAT
   ===================================================================== */
render();
refreshAll();

</script>
</body>
